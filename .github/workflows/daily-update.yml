name: CivicPulse Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: civicpulse-update
  cancel-in-progress: true

jobs:
  update-civicpulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CivicPulse update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python update.py

      - name: Commit and push generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/nyc/civicpulse_digest_New_York_NY.json
          git add local_news_labeled_New_York_NY.csv
          git diff --staged --quiet || git commit -m "CivicPulse update - $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin HEAD:main
